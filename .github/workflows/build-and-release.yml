name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_NAME: 'LocalAIStudio'
  PROJECT_FILE: 'LocalAIStudio/LocalAIStudio.csproj'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      id: restore
      run: |
        try {
          dotnet restore ${{ env.PROJECT_FILE }} 2>&1 | Tee-Object -FilePath restore.log
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Restore failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
        } catch {
          Write-Host "::error::Restore exception: $_"
          exit 1
        }
      continue-on-error: false

    - name: Build with detailed error logging
      id: build
      run: |
        try {
          Write-Host "=== Starting Build ==="
          $buildOutput = dotnet build ${{ env.PROJECT_FILE }} -c Release --no-restore 2>&1
          $buildOutput | Tee-Object -FilePath build.log
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Build failed with exit code $LASTEXITCODE"
            Write-Host "=== Detailed Error Analysis ==="
            
            # First, save all output for debugging
            $buildOutput | Out-File -FilePath full_build_output.txt -Encoding utf8
            
            # Analyze build errors - improved pattern matching
            $errorPattern = '(?s)(.*?)\((\d+),(\d+)\): error (\w+): (.*?)\s+\[(.*?)\.csproj\]'
            $errors = $buildOutput | Select-String -Pattern $errorPattern -AllMatches
            
            if ($errors) {
              $errorCount = 0
              foreach ($match in $errors.Matches) {
                $errorCount++
                $filePath = $match.Groups[1].Value.Trim()
                $line = $match.Groups[2].Value
                $column = $match.Groups[3].Value
                $errorCode = $match.Groups[4].Value
                $message = $match.Groups[5].Value
                $projectFile = $match.Groups[6].Value
                
                # Try to normalize file path
                if (-not [System.IO.Path]::IsPathRooted($filePath)) {
                  $filePath = Join-Path $env:GITHUB_WORKSPACE $filePath
                }
                
                Write-Host "::error file=${filePath},line=${line},col=${column}::${errorCode}: ${message}"
                Write-Host ""
                Write-Host "========================================"
                Write-Host "ERROR #${errorCount}"
                Write-Host "========================================"
                Write-Host "File:        ${filePath}"
                Write-Host "Location:    Line ${line}, Column ${column}"
                Write-Host "Error Code:  ${errorCode}"
                Write-Host "Project:     ${projectFile}.csproj"
                Write-Host "Message:     ${message}"
                Write-Host "========================================"
                Write-Host ""
              }
              Write-Host "Total Errors Found: ${errorCount}"
            } else {
              Write-Host "Could not parse specific errors. Showing all lines with 'error':"
              $errorLines = $buildOutput | Where-Object { $_ -match 'error' }
              $lineNum = 0
              foreach ($line in $errorLines) {
                $lineNum++
                Write-Host "::error::Error ${lineNum}: ${line}"
              }
            }
            
            # Show context around errors
            Write-Host ""
            Write-Host "=== Full Build Output ==="
            $buildOutput
            
            exit $LASTEXITCODE
          }
        } catch {
          Write-Host "::error::Build exception: $_"
          Write-Host "Stack Trace: $($_.ScriptStackTrace)"
          exit 1
        }
      continue-on-error: false

    - name: Publish Single File EXE
      id: publish
      run: |
        try {
          Write-Host "=== Starting Publish ==="
          $publishOutput = dotnet publish ${{ env.PROJECT_FILE }} `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o ./publish 2>&1
          $publishOutput | Tee-Object -FilePath publish.log
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Publish failed with exit code $LASTEXITCODE"
            Write-Host "=== Publish Error Analysis ==="
            
            $errorPattern = '(?s)(.*?)\((\d+),(\d+)\): error (\w+): (.*?)\s+\[(.*?)\.csproj\]'
            $errors = $publishOutput | Select-String -Pattern $errorPattern -AllMatches
            
            if ($errors) {
              $errorCount = 0
              foreach ($match in $errors.Matches) {
                $errorCount++
                $filePath = $match.Groups[1].Value.Trim()
                $line = $match.Groups[2].Value
                $column = $match.Groups[3].Value
                $errorCode = $match.Groups[4].Value
                $message = $match.Groups[5].Value
                $projectFile = $match.Groups[6].Value
                
                if (-not [System.IO.Path]::IsPathRooted($filePath)) {
                  $filePath = Join-Path $env:GITHUB_WORKSPACE $filePath
                }
                
                Write-Host "::error file=${filePath},line=${line},col=${column}::${errorCode}: ${message}"
                Write-Host ""
                Write-Host "PUBLISH ERROR #${errorCount}"
                Write-Host "File:        ${filePath}"
                Write-Host "Location:    Line ${line}, Column ${column}"
                Write-Host "Error Code:  ${errorCode}"
                Write-Host "Message:     ${message}"
                Write-Host ""
              }
            } else {
              $errorLines = $publishOutput | Where-Object { $_ -match 'error' }
              foreach ($line in $errorLines) {
                Write-Host "::error::${line}"
              }
            }
            
            Write-Host "=== Full Publish Output ==="
            $publishOutput
            
            exit $LASTEXITCODE
          }
        } catch {
          Write-Host "::error::Publish exception: $_"
          exit 1
        }
      continue-on-error: false

    - name: Create Release Archive
      if: success()
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath ./${{ env.PROJECT_NAME }}-win-x64.zip -Force
        Write-Host "Archive created successfully"

    - name: Upload EXE as Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: LocalAIStudio-EXE
        path: |
          ./publish/${{ env.PROJECT_NAME }}.exe
          ./${{ env.PROJECT_NAME }}-win-x64.zip
        retention-days: 30

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build.log
          publish.log
          restore.log
          full_build_output.txt
