<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Studio - 远程桌面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #3B82F6;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #64748B;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .connect-btn {
            width: 100%;
            padding: 15px;
            background: #3B82F6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .connect-btn:hover {
            background: #2563EB;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59,130,246,0.4);
        }

        .info-section {
            margin-top: 30px;
            padding: 20px;
            background: #F0F9FF;
            border-radius: 12px;
        }

        .info-section h3 {
            color: #0369A1;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .info-section ul {
            list-style: none;
            padding-left: 0;
        }

        .info-section li {
            color: #0C4A6E;
            font-size: 13px;
            padding: 5px 0;
            padding-left: 20px;
            position: relative;
        }

        .info-section li::before {
            content: "•";
            color: #3B82F6;
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        .note {
            margin-top: 20px;
            padding: 15px;
            background: #FFFBEB;
            border-radius: 10px;
            font-size: 12px;
            color: #92400E;
            line-height: 1.6;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .status.connecting {
            background: #FFFBEB;
            color: #92400E;
            display: block;
        }

        .status.connected {
            background: #ECFDF5;
            color: #065F46;
            display: block;
        }

        .status.error {
            background: #FEF2F2;
            color: #991B1B;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>远程桌面连接</h1>
        <p class="subtitle">Local AI Studio - 安全远程访问</p>

        <div class="form-group">
            <label for="host">主机地址</label>
            <input type="text" id="host" placeholder="例如: 192.168.1.100" value="localhost">
        </div>

        <div class="form-group">
            <label for="port">端口</label>
            <input type="number" id="port" placeholder="例如: 5900" value="5900">
        </div>

        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名">
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>

        <button class="connect-btn" onclick="connect()">连接远程桌面</button>

        <div id="status" class="status"></div>

        <div class="info-section">
            <h3>连接方式</h3>
            <ul>
                <li>使用 UltraVNC Viewer 等客户端软件连接</li>
                <li>支持局域网直接连接</li>
                <li>通过内网穿透支持公网访问</li>
                <li>使用加密的 VNC 协议传输</li>
            </ul>
        </div>

        <div class="note">
            <strong>注意：</strong>本页面仅作为连接指南示例。实际使用时，请下载并安装 VNC 客户端（如 UltraVNC Viewer）进行连接，或使用 noVNC 等 Web VNC 客户端库。
        </div>
    </div>

    <script>
        function connect() {
            const host = document.getElementById('host').value;
            const port = document.getElementById('port').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status connecting';
            statusDiv.textContent = '正在准备连接...';

            setTimeout(() => {
                statusDiv.className = 'status connected';
                statusDiv.innerHTML = `
                    <strong>连接信息已准备!</strong><br>
                    请使用 VNC 客户端软件连接: ${host}:${port}<br>
                    用户名: ${username}
                `;
                
                alert(`请使用 VNC 客户端连接到 ${host}:${port}\n用户名: ${username}`);
            }, 1000);
        }
    </script>
</body>
</html>
