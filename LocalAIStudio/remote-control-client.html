<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Studio - 远程访问控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 32px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #3B82F6;
            font-size: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #94A3B8;
        }

        .status-indicator.active {
            background: #10B981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .camera-container {
            background: #000;
            border-radius: 10px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .camera-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #3B82F6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563EB;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #10B981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .info-grid {
            display: grid;
            gap: 12px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #F0F9FF;
            border-radius: 8px;
        }

        .info-label {
            color: #64748B;
            font-size: 14px;
        }

        .info-value {
            color: #333;
            font-weight: 600;
        }

        .device-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
        }

        .device-item {
            padding: 10px 15px;
            border-bottom: 1px solid #F1F5F9;
        }

        .device-item:last-child {
            border-bottom: none;
        }

        .device-name {
            color: #333;
            font-weight: 600;
        }

        .device-desc {
            color: #64748B;
            font-size: 12px;
            margin-top: 3px;
        }

        .audio-container {
            text-align: center;
        }

        .audio-visualizer {
            height: 100px;
            background: #F8FAFC;
            border-radius: 10px;
            margin: 15px 0;
            display: flex;
            align-items: end;
            justify-content: center;
            gap: 3px;
        }

        .bar {
            width: 8px;
            background: #3B82F6;
            border-radius: 4px;
            animation: soundWave 0.5s ease-in-out infinite;
        }

        @keyframes soundWave {
            0%, 100% { height: 20px; }
            50% { height: 80px; }
        }

        .auth-section {
            background: #FFF8E1;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .auth-section input {
            width: 100%;
            padding: 10px;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            margin-top: 8px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 远程访问控制台</h1>
        </div>

        <div class="auth-section">
            <h3>身份验证</h3>
            <input type="text" id="username" placeholder="用户名">
            <input type="password" id="password" placeholder="密码" style="margin-top: 10px;">
        </div>

        <div class="main-grid">
            <!-- Camera Section -->
            <div class="card">
                <h2>
                    <span class="status-indicator" id="cameraStatus"></span>
                    摄像头监控
                </h2>
                <div class="camera-container" id="cameraContainer">
                    <span>点击下方按钮获取画面</span>
                    <img id="cameraSnapshot" class="camera-image" style="display: none;">
                </div>
                <div class="btn-group">
                    <button class="btn-primary" onclick="getSnapshot()">获取快照</button>
                    <button class="btn-success" onclick="toggleStream()">实时流</button>
                </div>
            </div>

            <!-- WiFi & System Info -->
            <div class="card">
                <h2>
                    <span class="status-indicator active"></span>
                    系统信息
                </h2>
                <div class="info-grid" id="wifiInfo">
                    <div class="info-item">
                        <span class="info-label">SSID</span>
                        <span class="info-value" id="wifiSsid">加载中...</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">信号强度</span>
                        <span class="info-value" id="wifiSignal">加载中...</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">连接状态</span>
                        <span class="info-value" id="wifiStatus">加载中...</span>
                    </div>
                </div>
                <div class="btn-group" style="margin-top: 15px;">
                    <button class="btn-primary" onclick="refreshWifi()">刷新信息</button>
                </div>
            </div>

            <!-- USB Devices -->
            <div class="card">
                <h2>
                    <span class="status-indicator active"></span>
                    USB 设备
                </h2>
                <div class="device-list" id="usbDeviceList">
                    <div class="device-item">
                        <span class="device-name">加载中...</span>
                    </div>
                </div>
                <div class="btn-group" style="margin-top: 15px;">
                    <button class="btn-primary" onclick="refreshUsbDevices()">刷新设备</button>
                </div>
            </div>

            <!-- Audio Section -->
            <div class="card">
                <h2>
                    <span class="status-indicator" id="audioStatus"></span>
                    远程音频
                </h2>
                <div class="audio-container">
                    <p>远程音频传输（测试功能）</p>
                    <div class="audio-visualizer" id="audioVisualizer" style="display: none;">
                        <div class="bar" style="animation-delay: 0s;"></div>
                        <div class="bar" style="animation-delay: 0.1s;"></div>
                        <div class="bar" style="animation-delay: 0.2s;"></div>
                        <div class="bar" style="animation-delay: 0.3s;"></div>
                        <div class="bar" style="animation-delay: 0.4s;"></div>
                    </div>
                    <div class="btn-group" style="justify-content: center; margin-top: 15px;">
                        <button class="btn-primary" onclick="testAudio()">测试音频</button>
                    </div>
                </div>
            </div>

            <!-- API Status -->
            <div class="card full-width">
                <h2>
                    <span class="status-indicator" id="apiStatus"></span>
                    API 状态
                </h2>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">服务器状态</span>
                        <span class="info-value" id="serverStatus">检测中...</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">响应时间</span>
                        <span class="info-value" id="responseTime">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let streamActive = false;
        let streamInterval = null;

        // Check API health on load
        window.onload = function() {
            checkApiStatus();
            refreshWifi();
            refreshUsbDevices();
        };

        function getAuthParams() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (username && password) {
                return `?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`;
            }
            return '';
        }

        async function checkApiStatus() {
            const startTime = Date.now();
            try {
                const response = await fetch(`/api/health${getAuthParams()}`);
                const endTime = Date.now();
                if (response.ok) {
                    document.getElementById('apiStatus').classList.add('active');
                    document.getElementById('serverStatus').textContent = '在线';
                    document.getElementById('responseTime').textContent = `${endTime - startTime}ms`;
                }
            } catch (e) {
                document.getElementById('serverStatus').textContent = '离线';
            }
        }

        async function getSnapshot() {
            try {
                document.getElementById('cameraStatus').classList.add('active');
                const response = await fetch(`/api/camera/snapshot${getAuthParams()}`);
                if (response.ok) {
                    const blob = await response.blob();
                    const img = document.getElementById('cameraSnapshot');
                    img.src = URL.createObjectURL(blob);
                    img.style.display = 'block';
                    document.getElementById('cameraContainer').querySelector('span').style.display = 'none';
                }
            } catch (e) {
                alert('获取快照失败: ' + e.message);
            }
        }

        async function toggleStream() {
            streamActive = !streamActive;
            if (streamActive) {
                document.getElementById('cameraStatus').classList.add('active');
                streamInterval = setInterval(getSnapshot, 500);
            } else {
                document.getElementById('cameraStatus').classList.remove('active');
                if (streamInterval) {
                    clearInterval(streamInterval);
                    streamInterval = null;
                }
            }
        }

        async function refreshWifi() {
            try {
                const response = await fetch(`/api/wifi${getAuthParams()}`);
                const data = await response.json();
                if (data.success && data.data.length > 0) {
                    const wifi = data.data[0];
                    document.getElementById('wifiSsid').textContent = wifi.SSID;
                    document.getElementById('wifiSignal').textContent = `${wifi.SignalStrength}%`;
                    document.getElementById('wifiStatus').textContent = wifi.IsConnected ? '已连接' : '未连接';
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function refreshUsbDevices() {
            try {
                const response = await fetch(`/api/devices/usb${getAuthParams()}`);
                const data = await response.json();
                if (data.success) {
                    const list = document.getElementById('usbDeviceList');
                    if (data.data.length === 0) {
                        list.innerHTML = '<div class="device-item"><span class="device-name">未检测到 USB 设备</span></div>';
                    } else {
                        list.innerHTML = data.data.slice(0, 10).map(device => 
                            `<div class="device-item">
                                <span class="device-name">${device.Name}</span>
                                <div class="device-desc">${device.Description}</div>
                            </div>`
                        ).join('');
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function testAudio() {
            document.getElementById('audioStatus').classList.add('active');
            document.getElementById('audioVisualizer').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('audioStatus').classList.remove('active');
                document.getElementById('audioVisualizer').style.display = 'none';
            }, 2000);
        }

        // Refresh status periodically
        setInterval(checkApiStatus, 5000);
    </script>
</body>
</html>
